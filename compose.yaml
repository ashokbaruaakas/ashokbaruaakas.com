services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: app_runtime
        image: app-build:latest
        container_name: app-build
        restart: unless-stopped
        environment:
            - APP_ENV=${APP_ENV:-production}
            - APP_DEBUG=${APP_DEBUG:-false}
            - APP_URL=${APP_URL:-http://localhost}
            - DB_CONNECTION=mysql
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT:-3306}
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - REDIS_PORT=${REDIS_PORT:-6379}
            - SESSION_DRIVER=${SESSION_DRIVER:-database}
            - CACHE_DRIVER=${CACHE_DRIVER:-redis}
            - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
            - SSR_ENABLED=${SSR_ENABLED:-true}
            - SSR_SERVER=${SSR_SERVER:-http://ssr:13714}
        # Coolify will provide a default network – no need to define it here

    web:
        build:
            context: .
            dockerfile: Dockerfile
            target: web_runtime
        image: laravel-nginx:latest
        container_name: laravel-web
        restart: unless-stopped
        environment:
            - LARAVEL_APP_HOST=app
            - LARAVEL_APP_PORT=9000

    ssr:
        build:
            context: .
            dockerfile: Dockerfile
            target: ssr_runtime
        image: laravel-ssr:latest
        container_name: laravel-ssr
        restart: unless-stopped
        environment:
            - NODE_ENV=production
            - APP_ENV=${APP_ENV:-production}
            - APP_DEBUG=${APP_DEBUG:-false}
            - APP_URL=${APP_URL:-http://localhost}
            - DB_CONNECTION=mysql
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT:-3306}
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_HOST=${REDIS_HOST}
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - REDIS_PORT=${REDIS_PORT:-6379}
            - SESSION_DRIVER=${SESSION_DRIVER:-database}
            - CACHE_DRIVER=${CACHE_DRIVER:-redis}
            - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
